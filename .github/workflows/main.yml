name: Build VPN AAR Library

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch: # Actions tab ကနေ Manual Run လို့ရအောင်

jobs:
  build-aar:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21' # သင့် Project နဲ့ကိုက်မယ့် Go version ပြောင်းပေးနိုင်ပါတယ်

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # Gomobile နဲ့ Gobind ကို Install လုပ်ခြင်း
      - name: Install Gomobile
        run: |
          go install golang.org/x/mobile/cmd/gomobile@latest
          go install golang.org/x/mobile/cmd/gobind@latest
          export PATH=$PATH:$(go env GOPATH)/bin
          gomobile init

      # Go Code ကို AAR အဖြစ် ပြောင်းလဲခြင်း
      - name: Build AAR
        run: |
          export PATH=$PATH:$(go env GOPATH)/bin
          
          # သတိပြုရန် - သင့် Go Code တွေရှိတဲ့ Folder ထဲကို အရင်ဝင်ရပါမယ်
          # ဥပမာ - cd tunnel (သို့မဟုတ် Project ရဲ့ Main Folder ဆိုရင် မလိုပါ)
          
          # .aar ထုတ်မယ့် Command
          gomobile bind -target=android -androidapi 21 -javapkg=com.customvpn.core -o wgcore.aar ./
          
      # ထွက်လာတဲ့ AAR ဖိုင်ကို Download ဆွဲလို့ရအောင် တင်ပေးခြင်း
      - name: Upload AAR Artifact
        uses: actions/upload-artifact@v4
        with:
          name: compiled-wgcore-aar
          path: ./*.aar # ထွက်လာတဲ့ AAR ဖိုင်ကို ယူမည်
