name: Build Custom AmneziaWG AAR

on:
  push:
    branches: [ "master", "main" ]
  workflow_dispatch:

jobs:
  build-aar:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21' # သင့် Repo နဲ့ ကိုက်ညီမည့် Version

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Gomobile
        run: |
          go install golang.org/x/mobile/cmd/gomobile@latest
          go install golang.org/x/mobile/cmd/gobind@latest
          export PATH=$PATH:$(go env GOPATH)/bin
          gomobile init

      - name: Build AAR with Gomobile
        run: |
          export PATH=$PATH:$(go env GOPATH)/bin
          # amneziawg-go တစ်ခုလုံးကို Library အဖြစ် Android အတွက် AAR ပြောင်းထုတ်ခြင်း
          gomobile bind -target=android -androidapi 21 -javapkg=com.amneziawg.core -o custom-wgcore.aar ./
          
      - name: Upload AAR File
        uses: actions/upload-artifact@v4
        with:
          name: amneziawg-custom-aar
          path: ./*.aar
