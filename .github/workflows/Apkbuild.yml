name: Build Android APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive # အထဲက dependency တွေပါ အကုန်ဆွဲရန်

      - name: set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug --stacktrace # Error တက်ရင် အသေးစိတ်ကြည့်ရန်

      - name: Check Where APK is
        run: find . -name "*.apk" # APK ဘယ်နားရောက်နေလဲ ရှာခိုင်းခြင်း

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: WGTunnel-Debug-APK
          path: "**/*.apk" # တွေ့သမျှ APK အကုန်သိမ်းခိုင်းခြင်း
